# Standard Docker Compose for Tangible (SQLite, single host).
#
# Usage:
#   docker compose -f docker/docker-compose.standard.yml up -d
#
# Override the image with `TANGIBLE_IMAGE=ghcr.io/bradbrownjr/tangible:0.17.1` to pin to a
# track main, or pin to a tag like `:0.1.0`.

services:
  tangible:
    image: ${TANGIBLE_IMAGE:-ghcr.io/bradbrownjr/tangible:latest}
    container_name: tangible
    restart: unless-stopped
    ports:
      - "${TANGIBLE_HTTP_PORT:-8000}:8000"
      # Retro HTML 1.0 interface (LAN only — plain HTTP, no TLS)
      # - "${TANGIBLE_RETRO_HTTP_PORT:-8080}:8080"
      # Retro Telnet interface (LAN only — plaintext)
      # - "${TANGIBLE_TELNET_PORT:-8023}:8023"
      # Retro Gopher interface (LAN only — plaintext)
      # - "${TANGIBLE_RETRO_GOPHER_PORT:-70}:70"
    environment:
      TZ: ${TZ:-UTC}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TANGIBLE_PUBLIC_URL: ${TANGIBLE_PUBLIC_URL:-http://localhost:8000}
      TANGIBLE_REGISTRATION_ENABLED: ${TANGIBLE_REGISTRATION_ENABLED:-true}
      # Optional: bootstrap an admin from env on first launch. If left empty,
      # the very first user to register through the web UI is automatically
      # promoted to admin (regardless of TANGIBLE_REGISTRATION_ENABLED).
      TANGIBLE_ADMIN_USERNAME: ${TANGIBLE_ADMIN_USERNAME:-}
      TANGIBLE_ADMIN_PASSWORD: ${TANGIBLE_ADMIN_PASSWORD:-}
      TANGIBLE_ADMIN_EMAIL: ${TANGIBLE_ADMIN_EMAIL:-}
      # Retro interfaces — uncomment to enable (LAN use only)
      # TANGIBLE_RETRO_HTTP_ENABLED: "true"
      # TANGIBLE_TELNET_ENABLED: "true"
      # TANGIBLE_RETRO_GOPHER_ENABLED: "true"
      # TANGIBLE_RETRO_GOPHER_HOST: "192.168.1.x"  # your LAN IP for Gopher menus
    volumes:
      - tangible-data:/data
      - tangible-config:/config
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  tangible-data:
  tangible-config:
