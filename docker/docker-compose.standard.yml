# Standard Docker Compose for Covet (SQLite, single host).
#
# Usage:
#   docker compose -f docker/docker-compose.standard.yml up -d
#
# Override the image with `IMAGE=ghcr.io/bradbrownjr/covet:edge` if you want to
# track main, or pin to a tag like `:0.1.0`.

services:
  covet:
    image: ${COVET_IMAGE:-ghcr.io/bradbrownjr/covet:edge}
    container_name: covet
    restart: unless-stopped
    ports:
      - "${COVET_HTTP_PORT:-8000}:8000"
    environment:
      TZ: ${TZ:-UTC}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      COVET_PUBLIC_URL: ${COVET_PUBLIC_URL:-http://localhost:8000}
      COVET_REGISTRATION_ENABLED: ${COVET_REGISTRATION_ENABLED:-true}
      # Optional: bootstrap an admin from env on first launch. If left empty,
      # the very first user to register through the web UI is automatically
      # promoted to admin (regardless of COVET_REGISTRATION_ENABLED).
      COVET_ADMIN_USERNAME: ${COVET_ADMIN_USERNAME:-}
      COVET_ADMIN_PASSWORD: ${COVET_ADMIN_PASSWORD:-}
      COVET_ADMIN_EMAIL: ${COVET_ADMIN_EMAIL:-}
    volumes:
      - covet-data:/data
      - covet-config:/config
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  covet-data:
  covet-config:
