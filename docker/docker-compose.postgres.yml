# Postgres overlay for Covet.
#
# Usage:
#   docker compose \
#     -f docker/docker-compose.standard.yml \
#     -f docker/docker-compose.postgres.yml up -d
#
# This adds a Postgres service and points Covet at it. The SQLite volume is
# still defined by the base file but goes unused; you can remove it from the
# base file if you want a strictly-Postgres deployment.

services:
  covet:
    depends_on:
      db:
        condition: service_healthy
    environment:
      COVET_DATABASE_URL: postgresql+psycopg://covet:${POSTGRES_PASSWORD:-covet}@db:5432/covet

  db:
    image: postgres:16-alpine
    container_name: covet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: covet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-covet}
      POSTGRES_DB: covet
    volumes:
      - covet-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covet -d covet"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  covet-pg:
