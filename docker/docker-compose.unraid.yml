# Unraid-friendly Docker Compose for Tangible.
#
# Pre-create:
#   /mnt/user/appdata/tangible/data
#   /mnt/user/appdata/tangible/config
#
# Macvlan mode: the container gets its own LAN IP so retro interfaces can use
# standard ports 80 (HTTP 1.0), 23 (Telnet), and 70 (Gopher) without conflicts.
#
# Set your chosen static LAN IP once here — it is reused for both the
# container's network assignment and the Gopher host advertisement:
x-lan-ip: &lan-ip "10.0.0.XXX"   # ← change to an unused IP on your LAN
#
# Usage (from any working dir):
#   docker compose -f docker-compose.unraid.yml up -d

services:
  tangible:
    image: ${TANGIBLE_IMAGE:-ghcr.io/bradbrownjr/tangible:latest}
    container_name: tangible
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    labels:
      net.unraid.docker.webui: "http://[IP]:8000/"
      net.unraid.docker.shell: "bash"
      net.unraid.docker.icon: "https://raw.githubusercontent.com/bradbrownjr/tangible/main/web/static/icon-512.png"
    environment:
      TZ: ${TZ:-Etc/UTC}
      # Unraid 'nobody:users' = 99:100
      PUID: 99
      PGID: 100
      UMASK: "0022"
      # ----- LAN-only first run (default) -----
      # Wildcard allows any Host header so you can reach the container
      # at http://<container-ip>:8000/ immediately. Once you put a reverse
      # proxy in front, narrow this to your real hostname and set
      # TANGIBLE_PUBLIC_URL + TANGIBLE_BEHIND_PROXY to match.
      TANGIBLE_PUBLIC_URL: ${TANGIBLE_PUBLIC_URL:-}
      TANGIBLE_ALLOWED_HOSTS: ${TANGIBLE_ALLOWED_HOSTS:-*}
      # TANGIBLE_BEHIND_PROXY: "true"
      TANGIBLE_REGISTRATION_ENABLED: ${TANGIBLE_REGISTRATION_ENABLED:-true}
      # Optional: bootstrap an admin from env on first launch.
      # TANGIBLE_ADMIN_USERNAME: admin
      # TANGIBLE_ADMIN_PASSWORD_FILE: /run/secrets/tangible_admin_password
      # Retro interfaces — uses standard ports since container has its own IP
      TANGIBLE_RETRO_HTTP_ENABLED: "true"
      TANGIBLE_RETRO_HTTP_PORT: "80"
      TANGIBLE_TELNET_ENABLED: "true"
      TANGIBLE_TELNET_PORT: "23"
      TANGIBLE_RETRO_GOPHER_ENABLED: "true"
      TANGIBLE_RETRO_GOPHER_PORT: "70"
      TANGIBLE_RETRO_GOPHER_HOST: *lan-ip
    volumes:
      - /mnt/user/appdata/tangible/data:/data
      - /mnt/user/appdata/tangible/config:/config
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      tangible_lan:
        ipv4_address: *lan-ip

networks:
  tangible_lan:
    driver: macvlan
    driver_opts:
      parent: br0
    ipam:
      config:
        - subnet: 10.0.0.0/24    # ← your LAN subnet
          ip_range: 10.0.0.XXX/32  # ← same IP as x-lan-ip above
