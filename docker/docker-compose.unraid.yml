# Unraid-friendly Docker Compose for Covet.
#
# Pre-create:
#   /mnt/user/appdata/covet/data
#   /mnt/user/appdata/covet/config
#
# Usage (from any working dir):
#   docker compose -f docker-compose.unraid.yml up -d
#
# This file uses absolute host paths; copy and edit as needed.

services:
  covet:
    image: ${COVET_IMAGE:-ghcr.io/bradbrownjr/covet:edge}
    container_name: covet
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      TZ: ${TZ:-America/Chicago}
      # Unraid 'nobody:users' = 99:100
      PUID: 99
      PGID: 100
      UMASK: "0022"
      COVET_PUBLIC_URL: ${COVET_PUBLIC_URL:-https://covet.lynwood.us}
      COVET_BEHIND_PROXY: "true"
      COVET_ALLOWED_HOSTS: ${COVET_ALLOWED_HOSTS:-covet.lynwood.us}
      COVET_REGISTRATION_ENABLED: "false"
      # Set these on first boot to bootstrap an admin without the wizard:
      # COVET_ADMIN_USERNAME: brad
      # COVET_ADMIN_PASSWORD_FILE: /run/secrets/covet_admin_password
    volumes:
      - /mnt/user/appdata/covet/data:/data
      - /mnt/user/appdata/covet/config:/config
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${COVET_NETWORK:-proxy}
